<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشروع التخرج | أداة قياس جودة الاتصال</title>

    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-surface: #ffffff;
            --text-dark: #202124;
            --text-gray: #5f6368;
            --border-color: #dadce0;
            --primary: #00643c; 
        }

        /* ضبط الصفحة لتكون على مقاس الشاشة بالضبط بدون تمرير */
        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* يمنع التمرير */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شريط علوي واضح وبحجم معقول */
        .top-bar {
            width: 100%;
            max-width: 900px;
            background: white;
            border-bottom: 2px solid var(--primary);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            gap: 15px;
        }

        .top-bar img {
            height: 55px; /* حجم متوسط وواضح للشعار */
            width: auto;
        }

        .top-bar-text {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
            border-right: 3px solid var(--primary);
            padding-right: 15px;
            line-height: 1.4;
        }

        /* حاوية الأداة - متصلة ومنسقة الطول */
        .dashboard-container {
            width: 100%;
            max-width: 900px;
            flex: 1; /* تجعل المربع يأخذ المساحة المتبقية من الشاشة */
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-top: none;
            padding: 20px 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* توزيع العناصر بشكل متساوي عمودياً */
        }

        .header-titles h1 {
            font-size: 24px;
            text-align: center;
            margin: 0;
            color: var(--text-dark);
        }

        /* شاشة السرعة - حجم كبير وواضح */
        .live-monitor {
            text-align: center;
            padding: 30px 0;
            background-color: #fafafa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .live-val {
            font-size: clamp(70px, 12vw, 100px); /* حجم كبير ملحوظ */
            font-weight: 300;
            line-height: 1;
            color: var(--text-dark);
            margin: 0;
        }

        .live-unit {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-gray);
            margin-top: 5px;
        }

        /* شبكة البطاقات - أرقام واضحة */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .data-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px 5px;
            text-align: center;
        }

        .card-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .card-val {
            font-size: 28px; /* حجم الرقم في البطاقات الصغير */
            font-weight: 800;
            color: var(--text-dark);
            direction: ltr;
        }

        .card-val span {
            font-size: 13px;
            color: var(--text-gray);
            margin-left: 2px;
        }

        .btn-start {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px 50px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            transition: 0.3s;
        }

        .btn-start:active { transform: scale(0.98); }

        #statusText {
            text-align: center;
            font-size: 15px;
            color: var(--text-gray);
            margin-top: 10px;
        }

        /* تحسينات الجوال */
        @media (max-width: 650px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .top-bar-text { font-size: 14px; }
            .top-bar img { height: 45px; }
            .dashboard-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="logo.png" alt="Logo">
        <div class="top-bar-text">
          مشروع تخرج متدربي الكلية التقنية بالعيدابي <span style="color:var(--primary)">2026م</span>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="header-titles">
            <h1>اختبار سرعة الإنترنت</h1>
        </div>

        <div class="live-monitor">
            <div class="live-val" id="mainValue">0</div>
            <div class="live-unit" id="mainUnit">Mbps</div>
        </div>

        <div class="cards-grid">
            <div class="data-card" id="boxUnloaded">
                <div class="card-label">Ping (Idle)</div>
                <div class="card-val"><span id="valUnloaded">--</span><span>ms</span></div>
            </div>
            
            <div class="data-card" id="boxDownload">
                <div class="card-label">Download</div>
                <div class="card-val"><span id="valDownload">--</span><span>Mb</span></div>
            </div>

            <div class="data-card" id="boxLoaded">
                <div class="card-label">Ping (Loaded)</div>
                <div class="card-val"><span id="valLoaded">--</span><span>ms</span></div>
            </div>

            <div class="data-card" id="boxUpload">
                <div class="card-label">Upload</div>
                <div class="card-val"><span id="valUpload">--</span><span>Mb</span></div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn-start" id="startBtn">بدء الاختبار</button>
            <div id="statusText">جاهز للفحص</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
